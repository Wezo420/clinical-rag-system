version: "3.9"

services:
  # ─────────────────────────────────────────────────────────────
  # Backend API (FastAPI)
  # ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: . #/backend
      dockerfile: docker/Dockerfile.backend
    container_name: clinical-rag-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_HOST_AUTH_METHOD=trust
      - MONGO_URI=mongodb://mongo:27017
      - REDIS_URL=redis://redis:6379/0
      - ML_SERVICE_URL=http://ml-service:8001
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - clinical-net

  # ─────────────────────────────────────────────────────────────
  # ML Service (CLIP + Embeddings)
  # ─────────────────────────────────────────────────────────────
  ml-service:
    build:
      context: . #/ml-service
      dockerfile: docker/Dockerfile.ml
    container_name: clinical-rag-ml
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ml-model-cache:/root/.cache
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    networks:
      - clinical-net

  # ─────────────────────────────────────────────────────────────
  # Frontend (Next.js)
  # ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: . #/frontend
      dockerfile: docker/Dockerfile.frontend
    container_name: clinical-rag-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NEXT_PUBLIC_APP_ENV=production
    depends_on:
      - backend
    networks:
      - clinical-net

  # ─────────────────────────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: clinical-rag-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: clinical_rag
      POSTGRES_USER: clinical_user
      POSTGRES_PASSWORD: pass@123
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinical_user -d clinical_rag"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clinical-net

  # ─────────────────────────────────────────────────────────────
  # MongoDB
  # ─────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7-jammy
    container_name: clinical-rag-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clinical-net

  # ─────────────────────────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: clinical-rag-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clinical-net

  # ─────────────────────────────────────────────────────────────
  # Nginx Reverse Proxy
  # ─────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: clinical-rag-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - clinical-net

volumes:
  postgres-data:
  mongo-data:
  redis-data:
  ml-model-cache:

networks:
  clinical-net:
    driver: bridge
